<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歐昇績效管理系統 v5.2 - 備註修正版</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #4F46E5; --primary-hover: #4338CA; --bg-color: #F3F4F6;
            --surface: #FFFFFF; --text-main: #1F2937; --text-muted: #6B7280;
            --danger: #EF4444; --success: #10B981; --warning: #F59E0B; --border: #E5E7EB;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg-color); color: var(--text-main); min-height: 100vh; line-height: 1.5; }
        section { display: none; padding: 30px 20px; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: var(--surface); border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 40px 30px; margin: 20px auto; width: 100%; max-width: 420px; text-align: center; }
        .input-group { position: relative; margin-bottom: 16px; text-align: left; }
        .input-group i { position: absolute; left: 14px; top: 14px; color: #9CA3AF; }
        .input-field { width: 100%; padding: 12px 12px 12px 40px; border: 1px solid var(--border); border-radius: 10px; font-size: 15px; background: #F9FAFB; transition: 0.3s; }
        .input-field.no-icon { padding-left: 12px; }
        .submit-btn { width: 100%; padding: 12px; border: none; border-radius: 10px; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; background: var(--primary); transition: 0.2s; }
        .admin-container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .admin-box { background: var(--surface); border-radius: 16px; padding: 24px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid var(--border); }
        .full-width { grid-column: span 2; }
        h3 { border-left: 4px solid var(--primary); padding-left: 12px; margin-bottom: 20px; font-size: 17px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; }
        .score-card { background: #fff; border-radius: 20px; padding: 30px; text-align: center; margin-bottom: 24px; border: 1px solid var(--border); }
        .score-num { font-size: 64px; font-weight: 800; color: var(--primary); }
        .bonus-badge { background: #EEF2FF; color: var(--primary); padding: 5px 15px; border-radius: 20px; font-weight: 700; font-size: 18px; margin-top: 10px; display: inline-block; }
        .btn-red { background: var(--danger) !important; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
        .btn-green { background: var(--success) !important; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
        .btn-orange { background: var(--warning) !important; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
        .announcement-box { background: #FFFBEB; border-left: 4px solid var(--warning); padding: 15px; border-radius: 12px; margin-bottom: 20px; color: #92400E; }
    </style>
</head>
<body>

    <section id="login-section" style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
        <div class="card">
            <h2 style="color:var(--primary); margin-bottom:20px;">歐昇績效雲端系統</h2>
            <form id="login-form">
                <div class="input-group"><i class="fas fa-user"></i><input type="text" id="username" class="input-field" placeholder="姓名 (管理者 admin)" required></div>
                <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="password" class="input-field" placeholder="密碼" required></div>
                <button type="submit" class="submit-btn">進入系統</button>
            </form>
        </div>
    </section>

    <section id="admin-section">
        <div style="max-width:1200px; margin:0 auto 20px; display:flex; justify-content:space-between; align-items:center;">
            <h2><i class="fas fa-user-shield"></i> 管理總部</h2>
            <button class="btn-red" onclick="logout()">安全登出</button>
        </div>
        
        <div class="admin-container">
            <div class="admin-box">
                <h3>新增紀錄</h3>
                <form id="add-record-form">
                    <select id="sel-employee" class="input-field no-icon" style="margin-bottom:10px;"></select>
                    <select id="sel-rule" class="input-field no-icon" style="margin-bottom:10px;"></select>
                    <input type="date" id="rec-date" class="input-field no-icon" style="margin-bottom:10px;">
                    <textarea id="rec-notes" class="input-field no-icon" placeholder="備註原因 (非常重要，員工會看到)" style="height:60px; margin-bottom:10px;"></textarea>
                    <button type="submit" class="submit-btn" style="background:var(--warning)">儲存雲端紀錄</button>
                </form>
            </div>

            <div class="admin-box">
                <h3>分數即時查詢</h3>
                <select id="query-emp" class="input-field no-icon" onchange="queryEmpScore()" style="margin-bottom:15px;"></select>
                <div id="query-result" style="text-align:center; padding:15px; background:#F9FAFB; border-radius:12px; border:1px dashed var(--border);"></div>
            </div>

            <div class="admin-box full-width">
                <h3 id="emp-manage-title">員工管理與獎金設定</h3>
                <div style="max-height:250px; overflow-y:auto; border:1px solid var(--border); border-radius:8px; margin-bottom:15px;">
                    <table>
                        <thead><tr><th>姓名</th><th>密碼</th><th>獎金級距</th><th style="text-align:right;">操作</th></tr></thead>
                        <tbody id="emp-body"></tbody>
                    </table>
                </div>
                <div id="emp-form-area" style="display:flex; gap:8px; flex-wrap: wrap; background:#f9f9f9; padding:15px; border-radius:10px;">
                    <input type="hidden" id="edit-emp-id">
                    <input type="text" id="new-emp-name" class="input-field no-icon" placeholder="姓名" style="flex:1;">
                    <input type="text" id="new-emp-pass" class="input-field no-icon" placeholder="密碼" style="flex:1;">
                    <input type="text" id="new-emp-bonus" class="input-field no-icon" placeholder="100:2000, 95:1000" style="flex:2;">
                    <button id="btn-save-emp" class="btn-green" onclick="addOrUpdateEmployee()">新增員工</button>
                    <button id="btn-cancel-edit" class="btn-red" onclick="resetEmpForm()" style="display:none;">取消修改</button>
                </div>
            </div>

            <div class="admin-box full-width">
                <h3>發布全局公告</h3>
                <textarea id="admin-announcement" class="input-field no-icon" placeholder="輸入消息..." style="height:60px; margin-bottom:10px;"></textarea>
                <button class="btn-green" onclick="saveAnnouncement()">發布公告</button>
            </div>

            <div class="admin-box full-width">
                <h3>歷史總表 (含備註)</h3>
                <div class="filter-bar" style="display:flex; gap:10px; margin-bottom:15px;">
                    <select id="filter-emp" class="input-field no-icon" style="width:auto;" onchange="updateHistoryUI()"></select>
                    <select id="filter-month" class="input-field no-icon" style="width:auto;" onchange="updateHistoryUI()"></select>
                </div>
                <div style="overflow-x:auto;">
                    <table>
                        <thead><tr><th>日期</th><th>姓名</th><th>項目</th><th>分數</th><th>備註內容</th><th style="text-align:right;">操作</th></tr></thead>
                        <tbody id="history-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>

    <section id="employee-section">
        <div style="max-width:600px; margin:0 auto;">
            <div id="announcement-display" class="announcement-box" style="display:none;"></div>
            <h2 id="emp-welcome-name" style="text-align:center;">姓名</h2>
            <div class="score-card">
                <p>本月評分</p>
                <div class="score-num" id="emp-score">100</div>
                <div class="bonus-badge" id="emp-bonus-display">預計獎金: $0</div>
            </div>
            <h3>本月扣分明細 (含備註)</h3>
            <div id="emp-record-list"></div>
            <button class="btn-red" onclick="logout()" style="width:100%; margin-top:20px; padding:12px;">登出</button>
        </div>
    </section>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAsE_7FhCZsJmYqEpRY-ZEB547iTdAc0N8",
            authDomain: "ossen-performance.firebaseapp.com",
            databaseURL: "https://ossen-performance-default-rtdb.firebaseio.com",
            projectId: "ossen-performance",
            storageBucket: "ossen-performance.firebasestorage.app",
            messagingSenderId: "485491497119",
            appId: "1:485491497119:web:3cceb3c94581112ae46aaa",
            measurementId: "G-MHWXXL641T"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let employees = [], rules = [], records = [], announcement = "";
        const ADMIN_MASTER_KEY = "671213";

        function syncFromCloud() {
            db.ref('/').on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    employees = data.employees || [];
                    rules = data.rules || [];
                    records = data.records ? (Array.isArray(data.records) ? data.records : Object.values(data.records)) : [];
                    announcement = data.announcement || "";
                    if (document.getElementById('admin-section').style.display === 'block') initAdmin();
                    if (document.getElementById('employee-section').style.display === 'block') {
                        const name = document.getElementById('emp-welcome-name').textContent.replace(' 您好', '');
                        const emp = employees.find(e => e.name === name);
                        if (emp) initEmployee(emp);
                    }
                }
            });
        }

        function saveData() { db.ref('/').update({ employees, rules, records, announcement }); }

        function initAdmin() {
            updateEmployeeUI();
            updateFilterOptions();
            updateHistoryUI();
            // 初始化扣分下拉選單
            document.getElementById('sel-rule').innerHTML = rules.map(r => `<option value="${r.id}">${r.name} (${r.pts})</option>`).join('');
        }

        function updateEmployeeUI() {
            document.getElementById('emp-body').innerHTML = employees.map(e => `
                <tr>
                    <td>${e.name}</td>
                    <td>${e.password}</td>
                    <td><small>${e.bonusConfig || ''}</small></td>
                    <td style="text-align:right;">
                        <button class="btn-orange" style="padding:4px 8px; font-size:12px;" onclick="prepareEdit('${e.id}')">修改</button>
                        <button class="btn-red" style="padding:4px 8px; font-size:12px;" onclick="delEmployee('${e.id}')">刪</button>
                    </td>
                </tr>
            `).join('');
            const opts = employees.map(e => `<option value="${e.id}">${e.name}</option>`).join('');
            document.getElementById('sel-employee').innerHTML = opts;
            document.getElementById('query-emp').innerHTML = '<option value="">查詢員工...</option>' + opts;
        }

        function prepareEdit(id) {
            const emp = employees.find(e => e.id === id);
            document.getElementById('edit-emp-id').value = emp.id;
            document.getElementById('new-emp-name').value = emp.name;
            document.getElementById('new-emp-pass').value = emp.password;
            document.getElementById('new-emp-bonus').value = emp.bonusConfig || "";
            document.getElementById('btn-save-emp').textContent = "儲存修改";
            document.getElementById('btn-cancel-edit').style.display = "inline-block";
        }

        function resetEmpForm() {
            document.getElementById('edit-emp-id').value = "";
            document.getElementById('new-emp-name').value = "";
            document.getElementById('new-emp-pass').value = "";
            document.getElementById('new-emp-bonus').value = "";
            document.getElementById('btn-save-emp').textContent = "新增員工";
            document.getElementById('btn-cancel-edit').style.display = "none";
        }

        function addOrUpdateEmployee() {
            const id = document.getElementById('edit-emp-id').value;
            const name = document.getElementById('new-emp-name').value.trim();
            const pass = document.getElementById('new-emp-pass').value.trim();
            const bonus = document.getElementById('new-emp-bonus').value.trim();
            if (!name || !pass) return alert('請填寫姓名與密碼');
            if (id) {
                const idx = employees.findIndex(e => e.id === id);
                employees[idx] = { ...employees[idx], name, password: pass, bonusConfig: bonus };
            } else {
                employees.push({ id: 'e'+Date.now(), name, password: pass, bonusConfig: bonus });
            }
            saveData(); resetEmpForm(); alert('儲存成功');
        }

        function queryEmpScore() {
            const id = document.getElementById('query-emp').value;
            if(!id) return;
            const emp = employees.find(e => e.id === id);
            const score = records.filter(r => r.empId === id && r.date.startsWith(new Date().toISOString().substring(0, 7))).reduce((acc, r) => acc + r.pts, 100);
            document.getElementById('query-result').innerHTML = `<div style="font-size:20px; font-weight:700; color:var(--primary);">${score} 分</div><div>預計獎金: $${calculateBonusLogic(score, emp.bonusConfig)}</div>`;
        }

        function calculateBonusLogic(score, config) {
            if(!config) return 0;
            const pairs = config.split(',').map(s => s.trim().split(':'));
            pairs.sort((a, b) => b[0] - a[0]);
            for(let [threshold, amount] of pairs) { if(score >= parseInt(threshold)) return amount; }
            return 0;
        }

        // --- 核心修正：讓員工看到備註 ---
        function initEmployee(emp) {
            document.getElementById('emp-welcome-name').textContent = emp.name + ' 您好';
            const curMonth = new Date().toISOString().substring(0, 7);
            const myRecords = records.filter(r => r.empId === emp.id && r.date.startsWith(curMonth));
            let score = 100;
            
            document.getElementById('emp-record-list').innerHTML = myRecords.map(r => {
                score += r.pts;
                return `
                <div style="background:white; padding:15px; margin-bottom:12px; border-radius:12px; border:1px solid var(--border);">
                    <div style="display:flex; justify-content:space-between; align-items:start;">
                        <div>
                            <b style="font-size:16px;">${r.ruleName}</b><br>
                            <small style="color:var(--text-muted)">日期：${r.date}</small>
                        </div>
                        <div style="color:var(--danger); font-weight:bold; font-size:18px;">${r.pts}</div>
                    </div>
                    <div style="margin-top:8px; padding-top:8px; border-top:1px dashed #eee; color:var(--primary); font-size:14px;">
                        <i class="fas fa-comment-dots"></i> 備註：${r.notes || '無'}
                    </div>
                </div>`;
            }).join('') || '<p style="text-align:center; padding:20px;">本月目前無扣分紀錄</p>';
            
            document.getElementById('emp-score').textContent = score;
            document.getElementById('emp-bonus-display').textContent = `預計獎金: $${calculateBonusLogic(score, emp.bonusConfig)}`;
            
            if(announcement) {
                document.getElementById('announcement-display').style.display = 'block';
                document.getElementById('announcement-display').innerHTML = `📢 <b>公告：</b>${announcement}`;
            } else {
                document.getElementById('announcement-display').style.display = 'none';
            }
        }

        // --- 核心修正：讓管理者在總表看到備註 ---
        function updateHistoryUI() {
            const ef = document.getElementById('filter-emp').value;
            const mf = document.getElementById('filter-month').value;
            const filtered = records.filter(r => (ef==='all' || r.empId===ef) && (mf==='all' || r.date.startsWith(mf)));
            
            document.getElementById('history-body').innerHTML = filtered.slice().reverse().map(r => `
                <tr>
                    <td>${r.date}</td>
                    <td><b>${r.empName}</b></td>
                    <td>${r.ruleName}</td>
                    <td style="color:var(--danger); font-weight:bold;">${r.pts}</td>
                    <td style="color:var(--primary);"><small>${r.notes || '-'}</small></td>
                    <td style="text-align:right;"><button class="btn-red" style="padding:2px 6px;" onclick="delRecord(${r.id})">刪</button></td>
                </tr>
            `).join('');
        }

        document.getElementById('add-record-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const eid = document.getElementById('sel-employee').value;
            const rule = rules.find(r => r.id === document.getElementById('sel-rule').value);
            const emp = employees.find(e => e.id === eid);
            const notes = document.getElementById('rec-notes').value.trim();
            
            if(!eid || !rule) return alert('請選擇員工與項目');

            records.push({ 
                id: Date.now(), 
                date: document.getElementById('rec-date').value, 
                empId: eid, 
                empName: emp.name, 
                ruleName: rule.name, 
                pts: rule.pts, 
                notes: notes // 確保備註被存入
            });
            saveData(); 
            document.getElementById('rec-notes').value = ''; 
            alert('紀錄存入成功！');
        });

        function updateFilterOptions() {
            document.getElementById('filter-emp').innerHTML = '<option value="all">所有員工</option>' + employees.map(e => `<option value="${e.id}">${e.name}</option>`).join('');
            const months = [...new Set(records.map(r => r.date.substring(0, 7)))].sort().reverse();
            document.getElementById('filter-month').innerHTML = '<option value="all">所有月份</option>' + months.map(m => `<option value="${m}">${m}</option>`).join('');
        }

        function saveAnnouncement() { announcement = document.getElementById('admin-announcement').value; saveData(); alert('公告已更新'); }
        function delEmployee(id) { if(confirm('刪除員工？')) { employees = employees.filter(e => e.id !== id); saveData(); } }
        function delRecord(id) { if(confirm('刪除紀錄？')) { records = records.filter(r => r.id !== id); saveData(); } }
        function logout() { location.reload(); }
        function showSection(id) { document.querySelectorAll('section').forEach(s => s.style.display = 'none'); document.getElementById(id).style.display = (id === 'login-section' ? 'flex' : 'block'); }

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value.trim(), p = document.getElementById('password').value.trim();
            if(u === 'admin' && p === ADMIN_MASTER_KEY) { showSection('admin-section'); initAdmin(); }
            else { const emp = employees.find(e => e.name === u && e.password === p); if(emp) { showSection('employee-section'); initEmployee(emp); } else alert('帳號密碼錯誤'); }
        });

        syncFromCloud();
        document.getElementById('rec-date').value = new Date().toISOString().split('T')[0];
    </script>
</body>
</html>
