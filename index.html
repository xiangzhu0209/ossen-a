<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>績效系統登入</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #6DD5FA, #2980B9);
        }
        .login-card {
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .card-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 35px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-field {
            width: 100%;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        .submit-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, #6DD5FA, #2980B9);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1 class="card-title">員工績效系統</h1>
        <form id="login-form">
            <div class="input-group">
                <input type="text" id="username" class="input-field" placeholder="請輸入帳號" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" class="input-field" placeholder="請輸入密碼" required>
            </div>
            <button type="submit" class="submit-btn">登入</button>
        </form>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', function(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // --- 登入邏輯判斷 ---
            // 實際應用中，這部分應由後端處理以確保安全
            
            // 管理者登入
            if (username.toLowerCase() === 'admin' && password === '671213') {
                alert('管理者登入成功！');
                window.location.href = 'admin.html'; // 跳轉到後台頁面
            } 
            // 員工 陳千慧 登入
            else if (username === '陳千慧' && password === '1005') {
                alert('陳千慧，您好！');
                window.location.href = 'employee.html'; // 跳轉到員工頁面
            } 
            // 登入失敗
            else {
                alert('帳號或密碼錯誤！');
            }
        });
    </script>
</body>
</html>
