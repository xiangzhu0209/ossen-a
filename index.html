<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歐昇績效管理系統 v4.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-color: #F3F4F6;
            --surface: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --danger: #EF4444;
            --success: #10B981;
            --warning: #F59E0B;
            --border: #E5E7EB;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg-color); color: var(--text-main); min-height: 100vh; line-height: 1.5; }
        
        section { display: none; padding: 30px 20px; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--surface); border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); padding: 40px 30px; margin: 20px auto; width: 100%; max-width: 420px; text-align: center; }
        .input-group { position: relative; margin-bottom: 16px; text-align: left; }
        .input-group i { position: absolute; left: 14px; top: 14px; color: #9CA3AF; }
        .input-field { width: 100%; padding: 12px 12px 12px 40px; border: 1px solid var(--border); border-radius: 10px; font-size: 15px; background: #F9FAFB; transition: 0.3s; }
        .input-field.no-icon { padding-left: 12px; }
        .input-field:focus { background: var(--surface); border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }

        .submit-btn { width: 100%; padding: 12px; border: none; border-radius: 10px; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; background: var(--primary); transition: 0.2s; }
        .submit-btn:hover { background: var(--primary-hover); transform: translateY(-1px); }
        
        .btn-red { background: var(--danger) !important; }
        .btn-green { background: var(--success) !important; }
        .btn-orange { background: var(--warning) !important; }
        .btn-small { width: auto; padding: 6px 12px; font-size: 13px; border: none; color: #fff; border-radius: 6px; cursor: pointer; }

        .admin-container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .admin-box { background: var(--surface); border-radius: 16px; padding: 24px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid var(--border); }
        .full-width { grid-column: span 2; }
        h3 { border-left: 4px solid var(--primary); padding-left: 12px; margin-bottom: 20px; font-size: 17px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; }
        th { background: #F9FAFB; color: var(--text-muted); }

        .score-card { background: #fff; border-radius: 20px; padding: 30px; text-align: center; margin-bottom: 24px; border: 1px solid var(--border); }
        .score-num { font-size: 64px; font-weight: 800; color: var(--primary); }
        .record-item { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }

        @media (max-width: 900px) { .admin-container { grid-template-columns: 1fr; } .full-width { grid-column: span 1; } }
    </style>
</head>
<body>

    <section id="login-section" style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
        <div class="card">
            <h2 style="color:var(--primary); margin-bottom:20px;">歐昇績效雲端系統</h2>
            <form id="login-form">
                <div class="input-group"><i class="fas fa-user"></i><input type="text" id="username" class="input-field" placeholder="姓名 (管理者輸入 admin)" required></div>
                <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="password" class="input-field" placeholder="密碼" required></div>
                <button type="submit" class="submit-btn">進入系統</button>
            </form>
        </div>
    </section>

    <section id="admin-section">
        <div style="max-width:1200px; margin:0 auto 20px; display:flex; justify-content:space-between; align-items:center;">
            <h2>管理後台</h2>
            <button class="btn-red btn-small" onclick="logout()">登出</button>
        </div>
        <div class="admin-container">
            <div class="admin-box">
                <h3>新增紀錄</h3>
                <form id="add-record-form">
                    <select id="sel-employee" class="input-field no-icon" style="margin-bottom:10px;"></select>
                    <select id="sel-rule" class="input-field no-icon" style="margin-bottom:10px;"></select>
                    <input type="date" id="rec-date" class="input-field no-icon" style="margin-bottom:10px;">
                    <textarea id="rec-notes" class="input-field no-icon" placeholder="備註" style="height:60px; margin-bottom:10px;"></textarea>
                    <button type="submit" class="submit-btn btn-orange">儲存雲端</button>
                </form>
            </div>
            <div class="admin-box">
                <h3>員工管理</h3>
                <div style="max-height:150px; overflow-y:auto;">
                    <table><tbody id="emp-body"></tbody></table>
                </div>
                <div style="display:flex; gap:5px; margin-top:10px;">
                    <input type="text" id="new-emp-name" class="input-field no-icon" placeholder="姓名" style="padding:8px;">
                    <input type="text" id="new-emp-pass" class="input-field no-icon" placeholder="密碼" style="padding:8px;">
                    <button class="btn-green btn-small" onclick="addEmployee()">新增</button>
                </div>
            </div>
            <div class="admin-box full-width">
                <h3>績效歷史總表</h3>
                <table>
                    <thead><tr><th>日期</th><th>姓名</th><th>項目</th><th>分數</th><th>備註</th><th>操作</th></tr></thead>
                    <tbody id="history-body"></tbody>
                </table>
            </div>
        </div>
    </section>

    <section id="employee-section">
        <div style="max-width:600px; margin:0 auto;">
            <h2 id="emp-welcome-name" style="text-align:center;">姓名</h2>
            <div class="score-card">
                <p>本月剩餘分數</p>
                <div class="score-num" id="emp-score">100</div>
            </div>
            <h3>扣分明細</h3>
            <div id="emp-record-list"></div>
            <button class="btn-red btn-small" onclick="logout()" style="width:100%; margin-top:20px;">安全登出</button>
        </div>
    </section>

    <script>
        // --- 1. Firebase 配置 ---
        const firebaseConfig = {
            apiKey: "AIzaSyAsE_7FhCZsJmYqEpRY-ZEB547iTdAc0N8",
            authDomain: "ossen-performance.firebaseapp.com",
            databaseURL: "https://ossen-performance-default-rtdb.firebaseio.com",
            projectId: "ossen-performance",
            storageBucket: "ossen-performance.firebasestorage.app",
            messagingSenderId: "485491497119",
            appId: "1:485491497119:web:3cceb3c94581112ae46aaa",
            measurementId: "G-MHWXXL641T"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let employees = [];
        let rules = [
            { id: 'r1', name: '補單失誤', pts: -1 },
            { id: 'r2', name: '下單失誤', pts: -5 },
            { id: 'r3', name: '遲到', pts: -10 }
        ];
        let records = [];
        const ADMIN_MASTER_KEY = "671213";

        // --- 2. 核心功能：雲端同步 ---
        function syncFromCloud() {
            db.ref('/').on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    employees = data.employees || [];
                    records = data.records ? Object.values(data.records) : [];
                    if (document.getElementById('admin-section').style.display === 'block') initAdmin();
                    if (document.getElementById('employee-section').style.display === 'block') {
                        const name = document.getElementById('emp-welcome-name').textContent.replace(' 您好', '');
                        const emp = employees.find(e => e.name === name);
                        if (emp) initEmployee(emp);
                    }
                }
            });
        }

        function saveData() {
            db.ref('/').set({ employees, records });
        }

        // --- 3. 登入邏輯 ---
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            if (user === 'admin' && pass === ADMIN_MASTER_KEY) {
                showSection('admin-section');
                initAdmin();
            } else {
                const emp = employees.find(e => e.name === user && e.password === pass);
                if (emp) {
                    showSection('employee-section');
                    initEmployee(emp);
                } else { alert('登入失敗'); }
            }
        });

        // --- 4. UI 更新 ---
        function initAdmin() {
            document.getElementById('emp-body').innerHTML = employees.map(e => `<tr><td>${e.name}</td><td>${e.password}</td><td><button onclick="delEmployee('${e.id}')" class="btn-red btn-small">刪除</button></td></tr>`).join('');
            document.getElementById('sel-employee').innerHTML = employees.map(e => `<option value="${e.id}">${e.name}</option>`).join('');
            document.getElementById('sel-rule').innerHTML = rules.map(r => `<option value="${r.id}">${r.name} (${r.pts})</option>`).join('');
            document.getElementById('history-body').innerHTML = records.slice().reverse().map(r => `<tr><td>${r.date}</td><td>${r.empName}</td><td>${r.ruleName}</td><td>${r.pts}</td><td>${r.notes}</td><td><button onclick="delRecord(${r.id})" class="btn-red btn-small">刪</button></td></tr>`).join('');
            document.getElementById('rec-date').value = new Date().toISOString().split('T')[0];
        }

        function initEmployee(emp) {
            document.getElementById('emp-welcome-name').textContent = emp.name + ' 您好';
            const curMonth = new Date().toISOString().substring(0, 7);
            const myRecords = records.filter(r => r.empId === emp.id && r.date.startsWith(curMonth));
            let score = 100;
            document.getElementById('emp-record-list').innerHTML = myRecords.map(r => {
                score += r.pts;
                return `<div class="record-item"><div><b>${r.ruleName}</b><br><small>${r.date}</small></div><div style="color:var(--danger); font-size:20px;">${r.pts}</div></div>`;
            }).join('');
            document.getElementById('emp-score').textContent = score;
        }

        function addEmployee() {
            const name = document.getElementById('new-emp-name').value;
            const pass = document.getElementById('new-emp-pass').value;
            if (name && pass) {
                employees.push({ id: 'e'+Date.now(), name, password: pass });
                saveData();
                document.getElementById('new-emp-name').value = '';
                document.getElementById('new-emp-pass').value = '';
            }
        }

        function delEmployee(id) { if(confirm('刪除員工？')) { employees = employees.filter(e => e.id !== id); saveData(); } }

        document.getElementById('add-record-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const empId = document.getElementById('sel-employee').value;
            const rule = rules.find(r => r.id === document.getElementById('sel-rule').value);
            const emp = employees.find(e => e.id === empId);
            records.push({ id: Date.now(), date: document.getElementById('rec-date').value, empId, empName: emp.name, ruleName: rule.name, pts: rule.pts, notes: document.getElementById('rec-notes').value });
            saveData();
            document.getElementById('rec-notes').value = '';
            alert('紀錄成功');
        });

        function delRecord(id) { if(confirm('刪除紀錄？')) { records = records.filter(r => r.id !== id); saveData(); } }
        function showSection(id) { document.querySelectorAll('section').forEach(s => s.style.display = 'none'); document.getElementById(id).style.display = (id==='login-section'?'flex':'block'); }
        function logout() { showSection('login-section'); }
        function syncFromCloud() {
            db.ref('/').on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    employees = data.employees || [];
                    records = data.records ? (Array.isArray(data.records) ? data.records : Object.values(data.records)) : [];
                    if (document.getElementById('admin-section').style.display === 'block') initAdmin();
                    if (document.getElementById('employee-section').style.display === 'block') {
                        const n = document.getElementById('emp-welcome-name').textContent.replace(' 您好', '');
                        const e = employees.find(x => x.name === n);
                        if (e) initEmployee(e);
                    }
                }
            });
        }
        syncFromCloud();
    </script>
</body>
</html>
