<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>員工績效管理系統</title>
    <!-- 引入圖示與字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        /* --- 基礎樣式 --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans TC', sans-serif; background: linear-gradient(135deg, #6DD5FA, #2980B9); color: #333; min-height: 100vh; }
        
        /* --- 通用卡片與按鈕 --- */
        .card { background: #fff; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); padding: 30px; margin: 20px auto; width: 95%; max-width: 450px; text-align: center; }
        .input-group { position: relative; margin-bottom: 20px; text-align: left; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #888; }
        .input-field { width: 100%; padding: 12px 12px 12px 45px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        .input-field.no-icon { padding-left: 12px; }
        .submit-btn { width: 100%; padding: 12px; border: none; border-radius: 8px; color: #fff; font-size: 18px; font-weight: 700; cursor: pointer; background: #2980B9; margin-top: 10px; }
        .submit-btn:hover { opacity: 0.9; }
        .btn-red { background: #e74c3c; }
        .btn-green { background: #27ae60; }
        .btn-small { width: auto; padding: 5px 10px; font-size: 14px; margin: 0 2px; }

        /* --- 區塊切換控制 --- */
        section { display: none; padding: 20px; } /* 預設所有區塊隱藏 */
        #login-section { display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        /* --- 管理者後台 (電腦版優先) --- */
        .admin-container { max-width: 1200px; margin: 0 auto; display: flex; gap: 20px; flex-wrap: wrap; }
        .admin-box { background: #fff; border-radius: 10px; padding: 20px; flex: 1; min-width: 350px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .admin-header { display: flex; justify-content: space-between; align-items: center; color: #fff; margin-bottom: 20px; max-width: 1200px; margin: 0 auto 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: left; font-size: 14px; }
        th { background: #f8f9fa; }

        /* --- 員工端 (手機版優先) --- */
        .employee-header { text-align: center; color: #fff; margin-bottom: 20px; }
        .score-card { background: #fff; border-radius: 15px; padding: 20px; text-align: center; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .score-num { font-size: 48px; font-weight: 700; color: #2980B9; }
        .record-item { background: #fff; border-radius: 10px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .record-info { text-align: left; }
        .record-date { font-size: 12px; color: #888; }
        .record-points { font-size: 20px; font-weight: 700; color: #e74c3c; }

        @media (max-width: 768px) {
            .admin-container { flex-direction: column; }
            .admin-box { min-width: 100%; }
        }
    </style>
</head>
<body>

    <!-- 1. 登入頁面 -->
    <section id="login-section" style="display: flex;">
        <div class="card">
            <h2 style="margin-bottom: 20px;">績效管理系統</h2>
            <form id="login-form">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" class="input-field" placeholder="帳號 (管理員/姓名)" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" class="input-field" placeholder="密碼" required>
                </div>
                <button type="submit" class="submit-btn">登入系統</button>
            </form>
        </div>
    </section>

    <!-- 2. 管理者後台 -->
    <section id="admin-section">
        <div class="admin-header">
            <h2><i class="fas fa-user-shield"></i> 管理者後台</h2>
            <button class="submit-btn btn-red btn-small" onclick="logout()">登出</button>
        </div>
        <div class="admin-container">
            <!-- 新增紀錄 -->
            <div class="admin-box">
                <h3><i class="fas fa-plus"></i> 新增績效紀錄</h3>
                <form id="add-record-form" style="margin-top: 15px;">
                    <div class="input-group">
                        <select id="sel-employee" class="input-field no-icon" required></select>
                    </div>
                    <div class="input-group">
                        <select id="sel-rule" class="input-field no-icon" required></select>
                    </div>
                    <div class="input-group">
                        <input type="date" id="rec-date" class="input-field no-icon" required>
                    </div>
                    <div class="input-group">
                        <textarea id="rec-notes" class="input-field no-icon" placeholder="備註事由"></textarea>
                    </div>
                    <button type="submit" class="submit-btn">儲存紀錄</button>
                </form>
            </div>

            <!-- 項目管理 -->
            <div class="admin-box">
                <h3><i class="fas fa-cog"></i> 項目及分數管理</h3>
                <div id="rule-manager" style="margin-top: 15px;">
                    <table id="rule-table">
                        <thead><tr><th>項目名稱</th><th>分數</th><th>操作</th></tr></thead>
                        <tbody id="rule-body"></tbody>
                    </table>
                    <div style="margin-top: 10px; display: flex; gap: 5px;">
                        <input type="text" id="new-rule-name" placeholder="新項目" style="flex:2; padding: 5px;">
                        <input type="number" id="new-rule-pts" placeholder="-1" style="flex:1; padding: 5px;">
                        <button class="btn-green" onclick="addRule()" style="padding: 5px 10px; border:none; color:#fff; border-radius:5px;">新增</button>
                    </div>
                </div>
            </div>

            <!-- 所有紀錄 -->
            <div class="admin-box" style="flex-basis: 100%;">
                <h3><i class="fas fa-list"></i> 歷史紀錄總表</h3>
                <table id="history-table">
                    <thead><tr><th>日期</th><th>姓名</th><th>項目</th><th>分數</th><th>備註</th></tr></thead>
                    <tbody id="history-body"></tbody>
                </table>
            </div>
        </div>
    </section>

    <!-- 3. 員工個人頁面 -->
    <section id="employee-section">
        <div class="employee-header">
            <h2 id="emp-welcome-name">姓名</h2>
            <p>本月績效報告</p>
            <button class="submit-btn btn-red btn-small" onclick="logout()" style="margin-top: 10px;">登出系統</button>
        </div>
        <div class="score-card">
            <p>當月總分</p>
            <div class="score-num" id="emp-score">100</div>
            <p style="color: #888; font-size: 14px;">(起始分數: 100)</p>
        </div>
        <h3 style="color: #fff; margin-bottom: 10px;">扣分明細</h3>
        <div id="emp-record-list"></div>
    </section>

    <script>
        // --- 預設資料 ---
        let employees = [{ id: 'e1', name: '陳千慧', password: '1005' }, { id: 'e2', name: '王大明', password: '1111' }];
        let rules = [
            { id: 'r1', name: '遲到', pts: -10 },
            { id: 'r2', name: '漏打卡', pts: -1 },
            { id: 'r3', name: '下單失誤(不可救)', pts: -5 }
        ];
        let records = [
            { date: '2026-03-10', empId: 'e1', empName: '陳千慧', ruleName: '遲到', pts: -10, notes: '早上開會遲到' }
        ];

        // --- 登入控制 ---
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // 1. 管理者登入
            if (user.toLowerCase() === 'admin' && pass === '671213') {
                showSection('admin-section');
                initAdmin();
            } 
            // 2. 員工登入
            else {
                const emp = employees.find(item => item.name === user && item.password === pass);
                if (emp) {
                    showSection('employee-section');
                    initEmployee(emp);
                } else {
                    alert('帳號或密碼錯誤！');
                }
            }
        });

        function showSection(id) {
            // 先隱藏所有
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('admin-section').style.display = 'none';
            document.getElementById('employee-section').style.display = 'none';
            // 顯示目標
            const target = document.getElementById(id);
            if(id === 'login-section') target.style.display = 'flex';
            else target.style.display = 'block';
        }

        // --- 管理者功能 ---
        function initAdmin() {
            // 載入下拉選單
            const empSel = document.getElementById('sel-employee');
            empSel.innerHTML = employees.map(e => `<option value="${e.id}">${e.name}</option>`).join('');
            
            updateRuleUI();
            updateHistoryUI();
            
            // 設定今天日期
            document.getElementById('rec-date').value = new Date().toISOString().split('T')[0];
        }

        function updateRuleUI() {
            const ruleSel = document.getElementById('sel-rule');
            ruleSel.innerHTML = rules.map(r => `<option value="${r.id}">${r.name} (${r.pts})</option>`).join('');

            const ruleBody = document.getElementById('rule-body');
            ruleBody.innerHTML = rules.map(r => `
                <tr>
                    <td>${r.name}</td>
                    <td>${r.pts}</td>
                    <td>
                        <button class="btn-small" onclick="editRule('${r.id}')">改</button>
                        <button class="btn-small btn-red" onclick="delRule('${r.id}')">刪</button>
                    </td>
                </tr>
            `).join('');
        }

        function updateHistoryUI() {
            const body = document.getElementById('history-body');
            body.innerHTML = records.map(r => `
                <tr><td>${r.date}</td><td>${r.empName}</td><td>${r.ruleName}</td><td>${r.pts}</td><td>${r.notes}</td></tr>
            `).join('');
        }

        function addRule() {
            const name = document.getElementById('new-rule-name').value;
            const pts = parseInt(document.getElementById('new-rule-pts').value);
            if(!name || isNaN(pts)) return alert('請輸入完整資訊');
            rules.push({ id: 'r' + Date.now(), name, pts });
            updateRuleUI();
            document.getElementById('new-rule-name').value = '';
        }

        function delRule(id) {
            rules = rules.filter(r => r.id !== id);
            updateRuleUI();
        }

        function editRule(id) {
            const r = rules.find(item => item.id === id);
            const newName = prompt('修改名稱', r.name);
            const newPts = prompt('修改分數', r.pts);
            if(newName && newPts) {
                r.name = newName;
                r.pts = parseInt(newPts);
                updateRuleUI();
            }
        }

        document.getElementById('add-record-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const empId = document.getElementById('sel-employee').value;
            const ruleId = document.getElementById('sel-rule').value;
            const date = document.getElementById('rec-date').value;
            const notes = document.getElementById('rec-notes').value;

            const emp = employees.find(e => e.id === empId);
            const rule = rules.find(r => r.id === ruleId);

            records.push({ date, empId, empName: emp.name, ruleName: rule.name, pts: rule.pts, notes });
            alert('儲存成功！');
            updateHistoryUI();
        });

        // --- 員工功能 ---
        function initEmployee(emp) {
            document.getElementById('emp-welcome-name').textContent = emp.name;
            const list = document.getElementById('emp-record-list');
            const empRecords = records.filter(r => r.empId === emp.id);
            
            let score = 100;
            list.innerHTML = empRecords.map(r => {
                score += r.pts;
                return `
                    <div class="record-item">
                        <div class="record-info">
                            <div style="font-weight:700;">${r.ruleName}</div>
                            <div class="record-date">${r.date}</div>
                            <div style="font-size:13px; color:#666;">${r.notes}</div>
                        </div>
                        <div class="record-points">${r.pts}</div>
                    </div>
                `;
            }).join('');
            
            if(empRecords.length === 0) list.innerHTML = '<p style="color:#fff; text-align:center;">本月暫無扣分紀錄</p>';
            document.getElementById('emp-score').textContent = score;
        }

        function logout() {
            showSection('login-section');
            document.getElementById('login-form').reset();
        }
    </script>
</body>
</html>
